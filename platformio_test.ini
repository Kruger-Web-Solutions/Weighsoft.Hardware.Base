; Minimal PlatformIO config for unit tests only (avoids full firmware lib_deps).
; Run: pio test -c platformio_test.ini -e esp32s3_test_mapping --without-uploading --without-testing

[platformio]
default_envs = esp32s3_test_mapping

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions_ble_ota.csv
build_flags =
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DARDUINO_USB_MODE=0
  -Isrc
lib_deps = ArduinoJson@>=6.0.0,<7.0.0
lib_compat_mode = strict
extra_scripts =

[env:esp32s3_test_mapping]
test_filter = test_forwarder_json_mapping
