[platformio]
extra_configs = 
  factory_settings.ini
  features.ini
;default_envs = esp12e
default_envs = esp32s3

[env]
build_flags=
  ${factory_settings.build_flags}
  ${features.build_flags}
  -D NO_GLOBAL_ARDUINOOTA
  ; Uncomment PROGMEM_WWW to enable the storage of the WWW data in PROGMEM
  -D PROGMEM_WWW
  ; Uncomment to configure Cross-Origin Resource Sharing
  ;-D ENABLE_CORS
  ;-D CORS_ORIGIN=\"*\"

; ensure transitive dependencies are included for correct platforms only
lib_compat_mode = strict

; OTA upload configuration for ESP32-S3 (uncomment when using wireless OTA)
; Set upload_port to your device IP (check web interface if changed)
;upload_flags =
; --port=8266
; --auth=esp-react
upload_port = 192.168.3.55
upload_protocol = espota

framework = arduino
monitor_speed = 115200

extra_scripts =
 pre:scripts/build_interface.py
 pre:scripts/clear_otadata.py

lib_deps =
  ArduinoJson@>=6.0.0,<7.0.0
  ; The following allows the use of the latest code for ESPAsyncWebServer - there hasn't been a release in a while
  ; Work around for https://github.com/me-no-dev/ESPAsyncWebServer/issues/1151
  https://github.com/me-no-dev/ESPAsyncWebServer
  ;ESP Async WebServer@>=1.2.0,<2.0.0
  AsyncMqttClient@>=0.9.0,<1.0.0
  links2004/WebSockets@^2.5.4
  
[env:esp12e]
platform = espressif8266
board = esp12e
board_build.f_cpu = 160000000L
board_build.filesystem = littlefs

[env:esp32dev]
; Generic ESP32 development board for troubleshooting
board_build.partitions = partitions_custom.csv
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs
; Increase watchdog timeout and enable verbose output
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
  -DCORE_DEBUG_LEVEL=5

[env:esp32s3]
; ESP32-S3 N16R8 board configuration (16MB flash, 8MB PSRAM)
; Supports native USB, more RAM (512KB + 8MB PSRAM), dual-core
; BLE + OTA supported
platform = espressif32
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
board_build.partitions = partitions_ble_ota.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
; ESP32-S3 specific settings
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
  ; BLE shares the 2.4 GHz radio with Wi‑Fi; disable on S3 for reliable STA + soft AP (re-enable via features if needed).
  -D FT_BLE=0
  ; Enable USB CDC for serial output over native USB
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=0

; USB upload (kept for emergency recovery)
;upload_protocol = esptool
;upload_port = COM11

; USB upload — board on COM3
upload_protocol = esptool
upload_port = COM3

; OTA upload (uncomment when target is reliably on WiFi)
;upload_protocol = espota
;upload_port = 192.168.2.68
;upload_flags =
;  --port=8266
;  --auth=esp-react


