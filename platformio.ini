[platformio]
extra_configs = 
  factory_settings.ini
  features.ini
;default_envs = esp12e
;default_envs = esp32s3
default_envs = firebeetle32

[env]
build_flags=
  ${factory_settings.build_flags}
  ${features.build_flags}
  -D NO_GLOBAL_ARDUINOOTA
  ; Uncomment PROGMEM_WWW to enable the storage of the WWW data in PROGMEM
  -D PROGMEM_WWW
  ; Uncomment to configure Cross-Origin Resource Sharing
  ;-D ENABLE_CORS
  ;-D CORS_ORIGIN=\"*\"

; ensure transitive dependencies are included for correct platforms only
lib_compat_mode = strict

; OTA upload configuration for ESP32-S3 (uncomment when using wireless OTA)
; Set upload_port to your device IP (check web interface if changed)
;upload_flags =
; --port=8266
; --auth=esp-react
upload_port = 192.168.3.55
upload_protocol = espota

framework = arduino
monitor_speed = 115200

extra_scripts = 
 pre:scripts/build_interface.py

lib_deps =
  ArduinoJson@>=6.0.0,<7.0.0
  ; The following allows the use of the latest code for ESPAsyncWebServer - there hasn't been a release in a while
  ; Work around for https://github.com/me-no-dev/ESPAsyncWebServer/issues/1151
  https://github.com/me-no-dev/ESPAsyncWebServer
  ;ESP Async WebServer@>=1.2.0,<2.0.0
  AsyncMqttClient@>=0.9.0,<1.0.0
  links2004/WebSockets@^2.5.4
  
[env:firebeetle32]
; DFRobot FireBeetle Board-ESP32 (DFR0478) - ESP-WROOM-32 MCU, 4MB flash
; BLE disabled - 4MB flash cannot fit BLE + dual OTA partitions
; OTA supported with partitions_4mb_ota.csv (dual 1.75MB app slots, 448KB filesystem)
board_build.partitions = partitions_4mb_ota.csv
platform = espressif32
board = firebeetle32
board_build.filesystem = littlefs
upload_protocol = esptool
upload_port = COM10
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10

[env:esp12e]
platform = espressif8266
board = esp12e
board_build.f_cpu = 160000000L
board_build.filesystem = littlefs

[env:node32s]
; Partition scheme with BLE support (NO OTA)
; Single factory partition: 3.3MB app, 640KB filesystem
; See docs/CONFIGURATION.md "OTA Limitations" for why OTA is not possible with BLE
board_build.partitions = partitions_ble.csv
platform = espressif32
board = node32s
board_build.filesystem = littlefs
upload_protocol = esptool
upload_port = COM11
; Increase watchdog timeout for large PROGMEM web interface
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10

[env:esp32dev]
; ESP32 DevKit V1 Type-C - 4MB flash, standard ESP32
; Connected to 3.5" TFT display (35002 V1.2) via VSPI — trying ST7796 driver
; GPIO18 = SPI SCK for TFT, so Serial1 RX remapped to GPIO16
board_build.partitions = partitions_4mb_ota.csv
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs
upload_protocol = esptool
upload_port = COM4
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
  -DHAS_TFT_DISPLAY=1
  ; Serial1 moved to GPIO25/26 — GPIO16/17 used by display MOSI/SCK
  -DSERIAL2_RX_PIN=25
  -DSERIAL2_TX_PIN=26
  ; DiagnosticsService moved to GPIO33/32 — frees GPIO17/18 for display SCK/MISO
  -DDIAG_RX_PIN=33
  -DDIAG_TX_PIN=32
  ; --- TFT_eSPI ILI9486 — proper VSPI hardware SPI pins ---
  ; MOSI (blue) moved to D23, SCK (brown) moved to D18, MISO (gray) removed (not needed)
  ; CS→D15, RST→D2, DC→D4, LED→D5 unchanged
  -DUSER_SETUP_LOADED=1
  -DILI9488_DRIVER=1
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=480
  -DTFT_MISO=19
  -DTFT_MOSI=23
  -DTFT_SCLK=18
  -DTFT_CS=15
  -DTFT_DC=4
  -DTFT_RST=2
  -DTFT_BL=21
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT6=1
  -DLOAD_FONT7=1
  -DLOAD_FONT8=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  -DSPI_FREQUENCY=4000000
  -DSPI_READ_FREQUENCY=4000000
  -DSPI_TOUCH_FREQUENCY=2500000
  ; Touch CS on unused pin — keeps it away from TFT_BL (D21)
  -DTOUCH_CS=22

[env:cyd28]
; Sunton ESP32-2432S028 ("Cheap Yellow Display" / CYD) — ESP32-WROOM-32, 4MB flash,
; 2.8" 320x240 ILI9341 TFT (HSPI on GPIO12/13/14, CS=15, DC=2, BL=21, RST tied to EN
; so TFT_RST=-1), XPT2046 resistive touch, microSD slot. CH340 USB-UART on the
; micro-USB connector (the USB-C is power-only on most variants).
;
; Role: Remote Weight DISPLAY — receives weight POSTs from a Forwarder and shows
; them on the TFT. SerialService runs but reads nothing (no scale wired).
board_build.partitions = partitions_4mb_ota.csv
platform = espressif32
board = esp32dev
board_build.filesystem = littlefs

; USB upload (kept for emergency recovery — toggle COM port as Windows assigns it):
;upload_protocol = esptool
;upload_port = COM14

; OTA upload — flashing the live CYD over WiFi at 192.168.2.88
upload_protocol = espota
upload_port = 192.168.2.88
upload_flags =
  --port=8266
  --auth=esp-react
lib_deps =
  ${env.lib_deps}
  bodmer/TFT_eSPI@^2.5.43
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
  -DHAS_TFT_DISPLAY=1
  ; Move SerialService UART1 and DiagnosticsService UART off the touch pins.
  ; CYD touch uses GPIO 25/32/33/39, so default Serial2 (16/17) and existing
  ; esp32dev choices (25/26 + 33/32) would clash. Park the unused UARTs on
  ; the I2C connector pads (GPIO 22/27) which are broken out and free.
  -DSERIAL2_RX_PIN=22
  -DSERIAL2_TX_PIN=27
  -DDIAG_RX_PIN=4
  -DDIAG_TX_PIN=16
  ; --- TFT_eSPI ILI9341 — CYD pinout, HSPI ---
  ; ILI9341_DRIVER (not _2) for the standard Sunton CYD panel; the _2 variant
  ; pre-inverts colours and produces a white-background image on this board.
  ; CYD panels ship with hardware colour inversion enabled at the controller —
  ; TFT_INVERT_DISPLAY tells DisplayService::begin() to call invertDisplay(true)
  ; so the dark navy status bar renders dark and the cyan accents render cyan.
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_INVERT_DISPLAY=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  ; CYD ties the panel reset to the ESP32 EN line — no separate GPIO.
  ; -1 makes TFT_eSPI skip the reset pulse (uses software reset instead).
  -DTFT_RST=-1
  -DTFT_BL=21
  -DTFT_BACKLIGHT_ON=HIGH
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT6=1
  -DLOAD_FONT7=1
  -DLOAD_FONT8=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000
  -DSPI_TOUCH_FREQUENCY=2500000
  ; XPT2046 touch shares VSPI on its own pins (CYD wiring)
  -DTOUCH_CS=33

[env:esp32s3]
; ESP32-S3 board configuration. Supports two Sixspan variants seen on this
; project:
;   - older boards: ESP32-S3 N8R2 (8 MB flash, 2 MB QSPI PSRAM)
;   - newer boards: ESP32-S3 N16R8 (16 MB flash, 8 MB OCTAL PSRAM, "AP_3v3")
; The N16R8 silently fails to boot if PSRAM is initialised in QSPI mode —
; chip detection succeeds, IDF early-init runs, then the app is silent. The
; fix is qio_opi: QIO flash + OPI octal PSRAM. Older N8R2 boards still boot
; fine with this combination because their QSPI PSRAM is auto-detected and
; initialised in the appropriate mode by the IDF.
platform = espressif32
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
board_build.partitions = partitions_ble_ota.csv
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
; ESP32-S3 specific settings
build_flags =
  ${env.build_flags}
  -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=10
  ; PSRAM intentionally NOT enabled at the malloc layer (no -DBOARD_HAS_PSRAM).
  ; The qio_opi memory_type above is still needed so the bootloader can talk
  ; to the octal-PSRAM chip without faulting (otherwise the boot ROM would
  ; mis-detect the SPI flash as PSRAM and crash). But Arduino-ESP32 leaves
  ; PSRAM unmapped in the heap allocator unless BOARD_HAS_PSRAM is set, which
  ; is exactly what we want — the framework's WiFi RX path has known leak
  ; issues with PSRAM-backed sk_buffs on this chip variant. With internal-RAM
  ; allocation only, we get ~256 KB free heap (plenty) and zero leak.
  ;
  ; Route Serial to USB-Serial-JTAG CDC so that:
  ;  - boot/runtime logs land on the USB COM port (no USB-TTL adapter needed)
  ;  - the optional weight echo (Serial.println of the scale line) lands on the same COM port
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=0

; USB upload — flashing fresh ESP32-S3 (Sixspan S3-N16R8). COM number
; changes with each replug; update as needed before flashing.
upload_protocol = esptool
upload_port = COM18

; OTA upload (uncomment when target is on WiFi)
;upload_protocol = espota
;upload_port = 192.168.2.71
;upload_flags =
;  --port=8266
;  --auth=esp-react

